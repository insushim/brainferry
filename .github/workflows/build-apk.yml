name: Build Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: Sign APK
        working-directory: android
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No unsigned APK found, listing build outputs:"
            find app/build -name "*.apk" 2>/dev/null || echo "No APKs at all"
            exit 1
          fi
          echo "Found APK: $APK_PATH"

          # Create debug keystore if not exists
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

          FINAL_APK="app/build/outputs/apk/release/brainferry-${{ github.ref_name }}.apk"

          # Try zipalign + apksigner
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          if [ -n "$BUILD_TOOLS_DIR" ]; then
            ALIGNED_APK="app/build/outputs/apk/release/brainferry-aligned.apk"
            "${BUILD_TOOLS_DIR}zipalign" -v -p 4 "$APK_PATH" "$ALIGNED_APK"
            "${BUILD_TOOLS_DIR}apksigner" sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out "$FINAL_APK" "$ALIGNED_APK"
          else
            # Fallback: just use jarsigner
            cp "$APK_PATH" "$FINAL_APK"
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore ~/.android/debug.keystore -storepass android "$FINAL_APK" androiddebugkey
          fi

          echo "SIGNED_APK=$FINAL_APK" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/${{ env.SIGNED_APK }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
