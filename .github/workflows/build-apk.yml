name: Build Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK with debug keystore
        working-directory: android
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            exit 1
          fi
          ALIGNED_APK="app/build/outputs/apk/release/brainferry-aligned.apk"
          SIGNED_APK="app/build/outputs/apk/release/brainferry-${{ github.ref_name }}.apk"
          zipalign -v -p 4 "$APK_PATH" "$ALIGNED_APK"
          apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out "$SIGNED_APK" "$ALIGNED_APK"
          echo "SIGNED_APK=$SIGNED_APK" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/${{ env.SIGNED_APK }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
